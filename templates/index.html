<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
</head>
<body style="text-align:center; font-family: Arial;">

    <h1>🌦️ Weather App</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required>
        <button type="submit">Get Weather</button>
    </form>

    {% if weather %}
        <h2>{{ weather }}</h2>
    {% endif %}

</body>
</html>
