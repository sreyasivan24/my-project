name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Python File
        run: python app.py

      - name: Install Bandit
        run: pip install bandit

      - name: Run Security Scan
        run: bandit -r .

      - name: Fail if issues found
        run: |
          bandit -r .
          if [ $? -ne 0 ]; then exit 1; fi
      - name: Send Email Notification
        if: always()
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText

          sender = "${{ secrets.EMAIL_USER }}"
          receiver = "${{ secrets.EMAIL_USER }}"
          password = "${{ secrets.EMAIL_PASS }}"

          msg = MIMEText("Code was pushed to repository successfully")
          msg['Subject'] = "CI Alert: Code Changed"
          msg['From'] = sender
          msg['To'] = receiver

          server = smtplib.SMTP('smtp.gmail.com', 587)
          server.starttls()
          server.login(sender, password)
          server.send_message(msg)
          server.quit()
          EOF