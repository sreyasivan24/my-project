name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Python File
        run: python app.py

      - name: Install Bandit
        run: pip install bandit

      - name: Run Security Scan
        run: bandit -r .

      - name: Fail if issues found
        run: |
          bandit -r .
          if [ $? -ne 0 ]; then exit 1; fi