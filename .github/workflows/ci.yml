name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flask bandit

      - name: Run Security Scan
        run: bandit -r . -ll

      - name: Get File Changes
        run: |
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          git diff --name-status HEAD^ HEAD >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Email Notification
        if: always()
        run: |
          python3 -c "
import smtplib
from email.mime.text import MIMEText

sender = '${{ secrets.EMAIL_USER }}'
receiver = '${{ secrets.EMAIL_USER }}'
password = '${{ secrets.EMAIL_PASS }}'

raw_changes = '''${{ env.CHANGES }}'''

added = []
modified = []
deleted = []

for line in raw_changes.splitlines():
    parts = line.split()
    if len(parts) < 2:
        continue

    status = parts[0]
    file = parts[1]

    if status == 'A':
        added.append(file)
    elif status == 'M':
        modified.append(file)
    elif status == 'D':
        deleted.append(file)

message = ''

if added:
    message += 'ADDED FILES:\n' + '\n'.join(added) + '\n\n'
if modified:
    message += 'MODIFIED FILES:\n' + '\n'.join(modified) + '\n\n'
if deleted:
    message += 'DELETED FILES:\n' + '\n'.join(deleted) + '\n\n'

if not message:
    message = 'No file changes detected.'

msg = MIMEText(message)
msg['Subject'] = 'CI Alert: File Change Report'
msg['From'] = sender
msg['To'] = receiver

server = smtplib.SMTP('smtp.gmail.com', 587)
server.starttls()
server.login(sender, password)
server.send_message(msg)
server.quit()

print('Email sent successfully')
"