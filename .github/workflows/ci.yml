- name: Send Email Notification
  if: always()
  continue-on-error: true
  run: |
    python - <<EOF
    import smtplib
    from email.mime.text import MIMEText

    try:
        sender = "${{ secrets.EMAIL_USER }}"
        receiver = "${{ secrets.EMAIL_USER }}"
        password = "${{ secrets.EMAIL_PASS }}"

        raw_changes = """${{ env.CHANGES }}"""

        message_lines = []

        for line in raw_changes.splitlines():
            if not line.strip():
                continue

            status, file = line.split("\t", 1)

            if status == "M":
                message_lines.append(f"{file} was MODIFIED")
            elif status == "A":
                message_lines.append(f"{file} was ADDED (UPDATED)")
            elif status == "D":
                message_lines.append(f"{file} was DELETED")
            else:
                message_lines.append(f"{file} was CHANGED")

        final_message = "\n".join(message_lines)

        msg = MIMEText(f"Repository Changes:\n\n{final_message}")
        msg['Subject'] = "CI Alert: File Changes"
        msg['From'] = sender
        msg['To'] = receiver

        server = smtplib.SMTP('smtp.gmail.com', 587)
        server.starttls()
        server.login(sender, password)
        server.send_message(msg)
        server.quit()

        print("Email sent successfully")

    except Exception as e:
        print("Email failed:", e)
        exit(0)
    EOF