name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flask bandit

      - name: Run Security Scan
        run: bandit -r .

      - name: Get Changes
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "CHANGES<<EOF" >> $GITHUB_ENV
            git diff --name-status HEAD^ HEAD >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "CHANGES=First commit - no previous changes" >> $GITHUB_ENV
          fi

      - name: Send Email Notification
        if: always()
        continue-on-error: true
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText

          try:
              sender = "${{ secrets.EMAIL_USER }}"
              receiver = "${{ secrets.EMAIL_USER }}"
              password = "${{ secrets.EMAIL_PASS }}"

              raw_changes = """${{ env.CHANGES }}"""
              message_lines = []

              for line in raw_changes.splitlines():
                  if not line.strip():
                      continue

                  parts = line.split("\t")
                  if len(parts) < 2:
                      continue

                  status, file = parts

                  if status == "M":
                      message_lines.append(f"{file} was MODIFIED")
                  elif status == "A":
                      message_lines.append(f"{file} was ADDED")
                  elif status == "D":
                      message_lines.append(f"{file} was DELETED")
                  else:
                      message_lines.append(f"{file} was CHANGED")

              final_message = "\n".join(message_lines) if message_lines else "No specific file changes detected"

              msg = MIMEText(f"Repository Changes:\n\n{final_message}")
              msg['Subject'] = "CI Alert: File Changes"
              msg['From'] = sender
              msg['To'] = receiver

              server = smtplib.SMTP('smtp.gmail.com', 587)
              server.starttls()
              server.login(sender, password)
              server.send_message(msg)
              server.quit()

              print("Email sent successfully")

          except Exception as e:
              print("Email failed:", e)
              exit(0)
          EOF